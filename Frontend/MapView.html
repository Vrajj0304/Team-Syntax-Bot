<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Map + - EcoWeather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            color: #2c3e50;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, #1b5e20 0%, #2d5016 100%);
            padding: 24px 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(45, 80, 22, 0.2);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px 30px;
            border-bottom: 2px solid rgba(76, 175, 80, 0.3);
        }

        .sidebar-logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4caf50, #2d5016);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .sidebar-logo-text h2 {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-logo-text p {
            color: #a5d6a7;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            color: #a5d6a7;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
        }

        .nav-item:hover {
            background: rgba(76, 175, 80, 0.15);
            color: #fff;
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(76, 175, 80, 0.25);
            color: #fff;
            border-left: 4px solid #4caf50;
            padding-left: 12px;
        }

        .nav-item-icon {
            font-size: 20px;
            min-width: 24px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 280px;
        }

        /* ===== HEADER ===== */
        .header {
            background: #fff;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.1);
            flex-shrink: 0;
            border-bottom: 2px solid #c8e6c9;
            z-index: 100;
            position: relative;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #1b5e20;
        }

        .header-subtitle {
            font-size: 14px;
            color: #558b2f;
        }

        .header-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-icon {
            font-size: 18px;
            color: #4caf50;
        }

        .control-dropdown {
            padding: 8px 16px;
            border: 2px solid #c8e6c9;
            border-radius: 6px;
            background: #f1f8e9;
            color: #1b5e20;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            min-width: 200px;
        }

        .control-dropdown:hover {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        /* ===== MAP IFRAME CONTAINER ===== */
        .map-frame-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 80px); 
            background: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-wrapper { margin-left: 240px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; overflow-x: auto; }
            .main-wrapper { margin-left: 0; }
            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .control-dropdown { width: 100%; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🌍</div>
        <div class="sidebar-logo-text">
            <h2>EnviroSat</h2>
            <p>Intelligence</p>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-item-icon">📊</span>
            <span>Dashboard</span>
        </a>
        <a href="Final_Satellite_Hub.html" class="nav-item">
            <span class="nav-item-icon">🛰️</span>
            <span>Satellite Hub</span>
        </a>
        <a href="Final_Time_Series.html" class="nav-item">
            <span class="nav-item-icon">📈</span>
            <span>Time Series</span>
        </a>
        <a href="Final_Ml_Analytics.html" class="nav-item">
            <span class="nav-item-icon">✨</span>
            <span>ML Analytics</span>
        </a>
        <a href="Final_Geospatial_Maps.html" class="nav-item">
            <span class="nav-item-icon">🗺️</span>
            <span>Geospatial Maps</span>
        </a>
        <a href="MapView.html" class="nav-item active">
            <span class="nav-item-icon">➕</span>
            <span>Environment Map +</span>
        </a>
        <a href="Final_Action_Plans.html" class="nav-item">
            <span class="nav-item-icon">📋</span>
            <span>Action Plans</span>
        </a>
    </nav>
</div>

<div class="main-wrapper">
    <div class="header">
        <div class="header-left">
            <h1 class="header-title">Environment Map +</h1>
            <p class="header-subtitle">Advanced Remote Sensing Visualizations (GEE Integration)</p>
        </div>

        <div class="header-controls">
            <div class="control-group">
                <span class="control-icon">🔍</span>
                <select id="mapSelect" class="control-dropdown" onchange="changeMap()">
                    <option value="gee_frontend_map.html">Temperature Level</option>
                    <option value="india_environmental_dashboard.html">Pollution Level (AQI)</option>
                    <option value="india_landsat_dashboard.html">Soil Moisture Level</option>
                    <option value="india_rainfall_land_dashboard (1)_new.html">Rainfall Level</option>
                </select>
            </div>
        </div>
    </div>

    <div class="map-frame-container">
        <iframe id="mapViewer" src="gee_frontend_map.html"></iframe>
    </div>
</div>

<script>
    function changeMap() {
        const select = document.getElementById('mapSelect');
        const iframe = document.getElementById('mapViewer');
        iframe.src = select.value;
    }
</script>

</body>
</html>
